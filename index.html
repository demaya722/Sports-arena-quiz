<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sports Arena | Quiz</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="main-wrapper">
        <section id="screen-welcome" class="active">
            <div class="glass-card">
                <h1>THE SPORTS ARENA</h1>
                <p>Demostra qui mana a la pista i als comandaments</p>
                <input type="text" id="username" placeholder="El teu nom..." autocomplete="off">
                <button class="btn-main" onclick="checkUser()">Començar Joc</button>
            </div>
        </section>

        <section id="screen-select">
            <div class="glass-card">
                <h2 id="welcome-user">Hola!</h2>
                <p>Tria una categoria per jugar:</p>
                <div class="category-grid">
                    <button class="cat-card" onclick="loadQuiz('A')">
                        <span class="emoji"></span>
                        <span>Jocs Olímpics</span>
                    </button>
                    <button class="cat-card" onclick="loadQuiz('B')">
                        <span class="emoji"></span>
                        <span>Món Gamer</span>
                    </button>
                </div>
            </div>
        </section>

        <section id="screen-game">
            <div class="glass-card">
                <div class="game-header">
                    <div class="timer-badge"><span id="timer">15</span>s</div>
                    <div id="progress">Pregunta 1/3</div>
                </div>
                <h3 id="question-text">Carregant pregunta...</h3>
                <div id="options-container" class="options-grid">
                </div>
            </div>
        </section>

        <section id="screen-results">
            <div class="glass-card">
                <h2>Partida Finalitzada</h2>
                <div class="score-display">
                    <span id="final-score">0</span>
                    <small>Correctes</small>
                </div>
                <div class="result-actions">
                    <button class="btn-main" onclick="restart()">Tornar a jugar</button>
                    <button class="btn-outline" onclick="exit()">Sortir</button>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>

</html>
